<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" fill="none">
  <defs>
    <!-- ── Green filters for F ── -->
    <filter id="f-ambient" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="28" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-mid" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-sharp" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ── Gold filters for W ── -->
    <filter id="w-ambient" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="30" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="w-mid" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="11" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="w-sharp" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Green gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#a7f3d0"/>
      <stop offset="35%"  stop-color="#4ade80"/>
      <stop offset="70%"  stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>

    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fef9c3"/>
      <stop offset="30%"  stop-color="#fde047"/>
      <stop offset="65%"  stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
  </defs>

  <!-- ══════════════════════════
       F  — Green
  ══════════════════════════ -->

  <!-- Layer 1: wide ambient green cloud -->
  <text x="112" y="235"
    font-family="'Arial Black','Impact','Haettenschweiler',sans-serif"
    font-weight="900" font-size="265"
    fill="none" stroke="#22c55e" stroke-width="18"
    filter="url(#f-ambient)" opacity="0.14"
  >F</text>

  <!-- Layer 2: medium glow -->
  <text x="112" y="235"
    font-family="'Arial Black','Impact','Haettenschweiler',sans-serif"
    font-weight="900" font-size="265"
    fill="none" stroke="#4ade80" stroke-width="8"
    filter="url(#f-mid)" opacity="0.30"
  >F</text>

  <!-- Layer 3: tight inner glow -->
  <text x="112" y="235"
    font-family="'Arial Black','Impact','Haettenschweiler',sans-serif"
    font-weight="900" font-size="265"
    fill="none" stroke="#86efac" stroke-width="3.5"
    filter="url(#f-sharp)" opacity="0.55"
  >F</text>

  <!-- Layer 4: crisp main outline -->
  <text x="112" y="235"
    font-family="'Arial Black','Impact','Haettenschweiler',sans-serif"
    font-weight="900" font-size="265"
    fill="none"
    stroke="url(#greenGrad)" stroke-width="2"
    stroke-linejoin="miter"
  >F</text>

  <!-- Layer 5: super-thin highlight shimmer -->
  <text x="112" y="235"
    font-family="'Arial Black','Impact','Haettenschweiler',sans-serif"
    font-weight="900" font-size="265"
    fill="none" stroke="#d1fae5" stroke-width="0.5"
    opacity="0.50"
  >F</text>


  <!-- ══════════════════════════
       W  — Gold
  ══════════════════════════ -->

  <!-- Layer 1: wide ambient gold cloud -->
  <text x="322" y="235"
    font-family="'Arial Black','Impact','Haettenschweiler',sans-serif"
    font-weight="900" font-size="265"
    fill="none" stroke="#d4af37" stroke-width="20"
    filter="url(#w-ambient)" opacity="0.16"
  >W</text>

  <!-- Layer 2: medium glow -->
  <text x="322" y="235"
    font-family="'Arial Black','Impact','Haettenschweiler',sans-serif"
    font-weight="900" font-size="265"
    fill="none" stroke="#fbbf24" stroke-width="9"
    filter="url(#w-mid)" opacity="0.32"
  >W</text>

  <!-- Layer 3: tight inner glow -->
  <text x="322" y="235"
    font-family="'Arial Black','Impact','Haettenschweiler',sans-serif"
    font-weight="900" font-size="265"
    fill="none" stroke="#fde68a" stroke-width="4"
    filter="url(#w-sharp)" opacity="0.55"
  >W</text>

  <!-- Layer 4: crisp main outline -->
  <text x="322" y="235"
    font-family="'Arial Black','Impact','Haettenschweiler',sans-serif"
    font-weight="900" font-size="265"
    fill="none"
    stroke="url(#goldGrad)" stroke-width="2"
    stroke-linejoin="miter"
  >W</text>

  <!-- Layer 5: super-thin highlight shimmer -->
  <text x="322" y="235"
    font-family="'Arial Black','Impact','Haettenschweiler',sans-serif"
    font-weight="900" font-size="265"
    fill="none" stroke="#fef3c7" stroke-width="0.5"
    opacity="0.55"
  >W</text>

</svg>
